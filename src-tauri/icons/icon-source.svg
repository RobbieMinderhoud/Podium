<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Podium app icon: three-step winner's podium (from LogoMark.tsx),
       accent-blue bars on a dark rounded tile. Source of truth for the
       generated PNG/ICNS/ICO icons — regenerate via `pnpm tauri icon`. -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c222b"/>
      <stop offset="1" stop-color="#0e1116"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-20%" width="160%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#tile)"/>

  <!-- Bars: LogoMark 100x100 geometry mapped via translate(212,146) scale(6). -->
  <g fill="#4493f8" filter="url(#shadow)" transform="translate(212,146) scale(6)">
    <rect x="8"  y="52" width="26" height="38" rx="4" opacity="0.72"/>
    <rect x="37" y="32" width="26" height="58" rx="4"/>
    <rect x="66" y="62" width="26" height="28" rx="4" opacity="0.5"/>
  </g>
</svg>
